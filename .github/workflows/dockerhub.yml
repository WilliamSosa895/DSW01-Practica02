name: Docker Hub Publish v0.5

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Validate Docker image name
        run: |
          if [ -z "$DOCKERHUB_IMAGE" ]; then
            echo "DOCKERHUB_IMAGE must be set as a GitHub Variable."
            exit 1
          fi

          case "$DOCKERHUB_IMAGE" in
            */*) : ;;
            *)
              echo "DOCKERHUB_IMAGE must look like 'username/repository'. Current value: $DOCKERHUB_IMAGE"
              exit 1
              ;;
          esac

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:latest
            ${{ env.DOCKERHUB_IMAGE }}:${{ github.sha }}