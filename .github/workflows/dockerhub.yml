name: Docker Hub Publish v0.7

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_IMAGE_RAW: ${{ vars.DOCKERHUB_IMAGE || format('{0}/{1}', secrets.DOCKERHUB_USERNAME, github.event.repository.name) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize Docker image name
        run: |
          if [ -z "$DOCKERHUB_IMAGE_RAW" ]; then
            echo "DOCKERHUB_IMAGE could not be resolved. Set it as a GitHub Variable or confirm DOCKERHUB_USERNAME is configured."
            exit 1
          fi

          normalized_image=$(printf '%s' "$DOCKERHUB_IMAGE_RAW" | tr '[:upper:]' '[:lower:]')
          echo "DOCKERHUB_IMAGE=$normalized_image" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Validate Docker image name
        run: |
          if [ -z "$DOCKERHUB_IMAGE" ]; then
            echo "DOCKERHUB_IMAGE could not be resolved after normalization."
            exit 1
          fi

          case "$DOCKERHUB_IMAGE" in
            */*) : ;;
            *)
              echo "DOCKERHUB_IMAGE must look like 'username/repository'. Current value: $DOCKERHUB_IMAGE"
              exit 1
              ;;
          esac

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:latest
            ${{ env.DOCKERHUB_IMAGE }}:${{ github.sha }}