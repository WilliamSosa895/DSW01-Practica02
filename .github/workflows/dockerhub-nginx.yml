name: Docker Hub Nginx Publish v0.1

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push-nginx:
    name: Build and Push Nginx Image
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.head_ref == 'develop' }}
    env:
      NGINX_IMAGE_RAW: ${{ vars.DOCKERHUB_NGINX_IMAGE || format('{0}/{1}-nginx', secrets.DOCKERHUB_USERNAME, github.event.repository.name) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize nginx image name
        run: |
          if [ -z "$NGINX_IMAGE_RAW" ]; then
            echo "DOCKERHUB_NGINX_IMAGE could not be resolved."
            exit 1
          fi

          normalized_nginx=$(printf '%s' "$NGINX_IMAGE_RAW" | tr '[:upper:]' '[:lower:]')
          echo "DOCKERHUB_NGINX_IMAGE=$normalized_nginx" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Validate nginx image name
        run: |
          case "$DOCKERHUB_NGINX_IMAGE" in */*) : ;; *) echo "Invalid nginx image: $DOCKERHUB_NGINX_IMAGE"; exit 1 ;; esac

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_NGINX_IMAGE }}:${{ github.ref_name }}
            ${{ env.DOCKERHUB_NGINX_IMAGE }}:${{ github.sha }}
