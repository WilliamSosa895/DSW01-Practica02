name: Sonar

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  sonar-analysis:
    name: Sonar Analysis
    runs-on: ubuntu-latest
    if: ${{ secrets.SONAR_TOKEN != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build backend classes for Sonar Java analysis
        run: mvn -B -DskipTests compile

      - name: Validate Sonar variables
        run: |
          if [ -z "${{ vars.SONAR_PROJECT_KEY }}" ] || [ -z "${{ vars.SONAR_ORGANIZATION }}" ]; then
            echo "SONAR_PROJECT_KEY and SONAR_ORGANIZATION must be set as GitHub Variables."
            exit 1
          fi

      - name: Run Sonar scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.sources=src/main/java,frontend/src
            -Dsonar.tests=src/test/java,frontend/src
            -Dsonar.test.inclusions=src/test/java/**/*.java,frontend/src/**/*.spec.ts
            -Dsonar.exclusions=**/target/**,**/node_modules/**,**/*.cy.js
            -Dsonar.java.binaries=target/classes
