# Sonar Cloud Analysis Workflow
name: Sonar

on:
  workflow_run:
    workflows:
      - Ci
    types:
      - completed
    branches:
      - develop
  workflow_dispatch:

jobs:
  sonar-analysis:
    name: Sonar Analysis
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY || secrets.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION || secrets.SONAR_ORGANIZATION }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build backend classes for Sonar Java analysis
        run: mvn -B -f backend/pom.xml -DskipTests compile

      - name: Validate Sonar variables
        run: |
          if [ -z "$SONAR_PROJECT_KEY" ] || [ -z "$SONAR_ORGANIZATION" ]; then
            echo "SONAR_PROJECT_KEY and SONAR_ORGANIZATION must be set as GitHub Variables."
            exit 1
          fi

      - name: Run Sonar scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.sources=backend/src/main/java,frontend/src
            -Dsonar.tests=backend/src/test/java,frontend/src
            -Dsonar.test.inclusions=backend/src/test/java/**/*.java,frontend/src/**/*.spec.ts
            -Dsonar.exclusions=**/target/**,**/node_modules/**,**/*.cy.js
            -Dsonar.java.binaries=backend/target/classes
