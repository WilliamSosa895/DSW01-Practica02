openapi: 3.0.3
info:
  title: Departamentos API
  version: 1.0.0
  description: API versionada para CRUD de departamentos y relacion con empleados.
servers:
  - url: http://localhost:8080
security:
  - basicAuth: []
paths:
  /api/v1/departamentos:
    get:
      summary: Listar departamentos (paginado)
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: size
          required: false
          schema:
            type: integer
            minimum: 5
            maximum: 5
            default: 5
      responses:
        '200':
          description: Pagina de departamentos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepartamentoPageResponse'
        '400':
          description: Parametros de paginacion invalidos
        '401':
          description: Credenciales invalidas o faltantes
    post:
      summary: Crear departamento
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartamentoCreateRequest'
      responses:
        '201':
          description: Departamento creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepartamentoResponse'
        '400':
          description: Datos invalidos
        '409':
          description: Nombre de departamento duplicado
        '401':
          description: Credenciales invalidas o faltantes
  /api/v1/departamentos/{clave}:
    get:
      summary: Consultar departamento por clave
      parameters:
        - in: path
          name: clave
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Departamento encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepartamentoDetailResponse'
        '404':
          description: Departamento no encontrado
        '401':
          description: Credenciales invalidas o faltantes
    put:
      summary: Actualizar departamento
      parameters:
        - in: path
          name: clave
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartamentoUpdateRequest'
      responses:
        '200':
          description: Departamento actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepartamentoResponse'
        '400':
          description: Datos invalidos
        '404':
          description: Departamento no encontrado
        '409':
          description: Nombre duplicado
        '401':
          description: Credenciales invalidas o faltantes
    delete:
      summary: Eliminar departamento
      parameters:
        - in: path
          name: clave
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Departamento eliminado
        '404':
          description: Departamento no encontrado
        '409':
          description: Departamento con empleados asociados
        '401':
          description: Credenciales invalidas o faltantes
  /api/v1/empleados:
    post:
      summary: Crear empleado con referencia a departamento
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmpleadoCreateWithDepartamentoRequest'
      responses:
        '201':
          description: Empleado creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpleadoResponse'
        '400':
          description: Datos invalidos
        '404':
          description: Departamento no encontrado
        '401':
          description: Credenciales invalidas o faltantes
  /actuator/health:
    get:
      summary: Estado de salud
      security: []
      responses:
        '200':
          description: Servicio saludable
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  schemas:
    DepartamentoCreateRequest:
      type: object
      required: [nombre]
      properties:
        nombre:
          type: string
          minLength: 1
          maxLength: 100
    DepartamentoUpdateRequest:
      type: object
      required: [nombre]
      properties:
        nombre:
          type: string
          minLength: 1
          maxLength: 100
    DepartamentoResponse:
      type: object
      required: [clave, nombre]
      properties:
        clave:
          type: integer
          format: int64
        nombre:
          type: string
          maxLength: 100
    DepartamentoDetailResponse:
      type: object
      required: [clave, nombre, empleados]
      properties:
        clave:
          type: integer
          format: int64
        nombre:
          type: string
          maxLength: 100
        empleados:
          type: array
          items:
            $ref: '#/components/schemas/EmpleadoResumen'
    EmpleadoResumen:
      type: object
      required: [clave, nombre, direccion, telefono]
      properties:
        clave:
          type: integer
          format: int64
        nombre:
          type: string
          maxLength: 100
        direccion:
          type: string
          maxLength: 100
        telefono:
          type: string
          maxLength: 100
    EmpleadoCreateWithDepartamentoRequest:
      type: object
      required: [nombre, direccion, telefono, contrasena, departamentoClave]
      properties:
        nombre:
          type: string
          maxLength: 100
        direccion:
          type: string
          maxLength: 100
        telefono:
          type: string
          maxLength: 100
        contrasena:
          type: string
          minLength: 8
          maxLength: 64
          writeOnly: true
        departamentoClave:
          type: integer
          format: int64
    EmpleadoResponse:
      type: object
      required: [clave, nombre, direccion, telefono, departamento]
      properties:
        clave:
          type: integer
          format: int64
        nombre:
          type: string
          maxLength: 100
        direccion:
          type: string
          maxLength: 100
        telefono:
          type: string
          maxLength: 100
        departamento:
          $ref: '#/components/schemas/DepartamentoResponse'
    DepartamentoPageResponse:
      type: object
      required: [content, page, size, totalElements, totalPages]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/DepartamentoResponse'
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 5
          maximum: 5
        totalElements:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
