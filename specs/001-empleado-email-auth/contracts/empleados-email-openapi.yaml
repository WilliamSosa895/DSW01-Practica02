openapi: 3.0.3
info:
  title: Empleados API - Email Auth
  version: 1.0.0
  description: Contrato de cambios para email obligatorio y autenticacion por email.
servers:
  - url: http://localhost:8080
security:
  - basicAuth: []
paths:
  /api/v1/empleados:
    post:
      summary: Crear empleado con email obligatorio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmpleadoCreateRequest'
      responses:
        '201':
          description: Empleado creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpleadoResponse'
        '400':
          description: Email ausente o formato invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Credenciales invalidas o faltantes
        '409':
          description: Email duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: Listar empleados (paginado)
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: size
          required: false
          schema:
            type: integer
            minimum: 5
            maximum: 5
            default: 5
      responses:
        '200':
          description: Pagina de empleados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpleadoPageResponse'
        '400':
          description: Parametros de paginacion invalidos
        '401':
          description: Credenciales invalidas o faltantes
  /api/v1/empleados/{clave}:
    get:
      summary: Obtener empleado por clave
      parameters:
        - in: path
          name: clave
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Empleado encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpleadoResponse'
        '404':
          description: Empleado no encontrado
        '401':
          description: Credenciales invalidas o faltantes
    put:
      summary: Actualizar empleado con email obligatorio
      parameters:
        - in: path
          name: clave
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmpleadoUpdateRequest'
      responses:
        '200':
          description: Empleado actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpleadoResponse'
        '400':
          description: Email ausente o formato invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Empleado o departamento no encontrado
        '409':
          description: Email duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Credenciales invalidas o faltantes
  /api/v1/departamentos:
    get:
      summary: Endpoint protegido para validar autenticacion por email en Basic Auth
      responses:
        '200':
          description: Acceso permitido con credenciales validas
        '401':
          description: Credenciales invalidas o faltantes
  /actuator/health:
    get:
      summary: Estado de salud
      security: []
      responses:
        '200':
          description: Servicio saludable
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  schemas:
    EmpleadoCreateRequest:
      type: object
      required: [nombre, email, direccion, telefono, contrasena, departamentoClave]
      properties:
        nombre:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
          minLength: 5
          maxLength: 254
        direccion:
          type: string
          minLength: 1
          maxLength: 100
        telefono:
          type: string
          minLength: 1
          maxLength: 100
        contrasena:
          type: string
          minLength: 8
          maxLength: 64
          writeOnly: true
        departamentoClave:
          type: integer
          format: int64
    EmpleadoUpdateRequest:
      type: object
      required: [nombre, email, direccion, telefono, activo, departamentoClave]
      properties:
        nombre:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
          minLength: 5
          maxLength: 254
        direccion:
          type: string
          minLength: 1
          maxLength: 100
        telefono:
          type: string
          minLength: 1
          maxLength: 100
        activo:
          type: boolean
        departamentoClave:
          type: integer
          format: int64
    EmpleadoResponse:
      type: object
      required: [clave, nombre, email, direccion, telefono, activo, departamento]
      properties:
        clave:
          type: integer
          format: int64
        nombre:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 254
        direccion:
          type: string
          maxLength: 100
        telefono:
          type: string
          maxLength: 100
        activo:
          type: boolean
        departamento:
          $ref: '#/components/schemas/DepartamentoResponse'
    DepartamentoResponse:
      type: object
      required: [clave, nombre]
      properties:
        clave:
          type: integer
          format: int64
        nombre:
          type: string
          maxLength: 100
    EmpleadoPageResponse:
      type: object
      required: [content, page, size, totalElements, totalPages]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/EmpleadoResponse'
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 5
          maximum: 5
        totalElements:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
    ErrorResponse:
      type: object
      required: [status, error, message, path]
      properties:
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string
