openapi: 3.0.3
info:
  title: Employees Auth API
  version: 1.0.0
  description: API versionada para autenticacion por empleado y gestion de credenciales.
servers:
  - url: http://localhost:8080
security:
  - basicAuth: []
paths:
  /api/v1/empleados:
    get:
      summary: Listar empleados (paginado)
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: size
          required: false
          schema:
            type: integer
            minimum: 5
            maximum: 5
            default: 5
      responses:
        '200':
          description: Pagina de empleados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpleadoPageResponse'
        '400':
          description: Parametros de paginacion invalidos
        '401':
          description: Credenciales invalidas o faltantes
    post:
      summary: Crear empleado con contrasena
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmpleadoCreateRequest'
      responses:
        '201':
          description: Empleado creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpleadoResponse'
        '400':
          description: Datos invalidos
        '401':
          description: Credenciales invalidas o faltantes
  /api/v1/empleados/{clave}:
    get:
      summary: Consultar empleado por clave
      parameters:
        - in: path
          name: clave
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Empleado encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpleadoResponse'
        '404':
          description: Empleado no encontrado
    put:
      summary: Actualizar empleado (incluye contrasena)
      parameters:
        - in: path
          name: clave
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmpleadoUpdateRequest'
      responses:
        '200':
          description: Empleado actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpleadoResponse'
        '400':
          description: Datos invalidos
        '401':
          description: Credenciales invalidas o faltantes
        '404':
          description: Empleado no encontrado
    delete:
      summary: Eliminar empleado
      parameters:
        - in: path
          name: clave
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Empleado eliminado
        '404':
          description: Empleado no encontrado
        '401':
          description: Credenciales invalidas o faltantes
  /actuator/health:
    get:
      summary: Estado de salud
      security: []
      responses:
        '200':
          description: Servicio saludable
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  schemas:
    EmpleadoCreateRequest:
      type: object
      required: [nombre, direccion, telefono, contrasena]
      properties:
        nombre:
          type: string
          maxLength: 100
        direccion:
          type: string
          maxLength: 100
        telefono:
          type: string
          maxLength: 100
        contrasena:
          type: string
          minLength: 8
          maxLength: 64
          pattern: '^(?=.*[A-Z])(?=.*[a-z])(?=.*[0-9])(?=.*[^A-Za-z0-9])[\\x20-\\x7E]{8,64}$'
          writeOnly: true
    EmpleadoUpdateRequest:
      type: object
      required: [nombre, direccion, telefono, contrasena]
      properties:
        nombre:
          type: string
          maxLength: 100
        direccion:
          type: string
          maxLength: 100
        telefono:
          type: string
          maxLength: 100
        contrasena:
          type: string
          minLength: 8
          maxLength: 64
          pattern: '^(?=.*[A-Z])(?=.*[a-z])(?=.*[0-9])(?=.*[^A-Za-z0-9])[\\x20-\\x7E]{8,64}$'
          writeOnly: true
    EmpleadoResponse:
      type: object
      required: [clave, nombre, direccion, telefono]
      properties:
        clave:
          type: integer
          format: int64
        nombre:
          type: string
          maxLength: 100
        direccion:
          type: string
          maxLength: 100
        telefono:
          type: string
          maxLength: 100
    EmpleadoPageResponse:
      type: object
      required: [content, page, size, totalElements, totalPages]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/EmpleadoResponse'
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 5
          maximum: 5
        totalElements:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
